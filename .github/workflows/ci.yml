name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npx --yes @redocly/cli@2.12.3 lint docs/openapi.yaml --extends=minimal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:coverage
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn --batch-mode verify

  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: travel_assistant
          MYSQL_USER: travel
          MYSQL_PASSWORD: travel
          MYSQL_ROOT_PASSWORD: local-root-password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -plocal-root-password"
          --health-interval=10s --health-timeout=5s --health-retries=10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
          DB_USERNAME: travel
          DB_PASSWORD: travel
          TRIP_AI_PROVIDER: stub
          CONSULTATION_AI_PROVIDER: stub
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: frontend/playwright-report, retention-days: 7 }

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
        env:
          MYSQL_DATABASE: travel_assistant
          MYSQL_USER: travel
          MYSQL_PASSWORD: ci-only-password
          MYSQL_ROOT_PASSWORD: ci-only-root-password
          JWT_SECRET: ci-only-secret-value-with-at-least-32-bytes
          TRIP_AI_PROVIDER: stub
          CONSULTATION_AI_PROVIDER: stub
          REALTIME_PROVIDER_MODE: stub
      - run: bash scripts/compose-smoke.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - name: Build the backend release JAR from this checkout
        run: |
          mvn --batch-mode -f backend/pom.xml -DskipTests package
          test -s backend/target/travel-assistant-api-0.1.0.jar
      - name: Record the fixed scanner version
        run: docker run --rm aquasec/trivy:0.58.2 --version
      - name: Scan the release JAR for every High or Critical vulnerability
        run: >-
          docker run --rm -v "$PWD:/workspace:ro" aquasec/trivy:0.58.2 fs
          --scanners vuln --severity HIGH,CRITICAL --exit-code 1
          /workspace/backend/target/travel-assistant-api-0.1.0.jar
      - name: Scan only tracked source files for secrets
        run: |
          tracked="$(mktemp -d)"
          trap 'rm -rf "$tracked"' EXIT
          git archive HEAD | tar -x -C "$tracked"
          docker run --rm -v "$tracked:/workspace:ro" aquasec/trivy:0.58.2 fs \
            --scanners secret --exit-code 1 /workspace

  release-candidate:
    runs-on: ubuntu-latest
    needs: [openapi, frontend, backend, e2e, container-smoke, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: mvn -q -f backend/pom.xml -DskipTests package
      - run: npm ci && npm run build && npm sbom --sbom-format cyclonedx > ../frontend-sbom.cdx.json
        working-directory: frontend
      - run: mvn -q -f backend/pom.xml org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom
      - run: |
          mkdir -p release
          cp backend/target/travel-assistant-api-0.1.0.jar release/
          cp backend/target/bom.json release/backend-sbom.cdx.json
          cp frontend-sbom.cdx.json docs/openapi.yaml CHANGELOG.md release/
          tar -C frontend/dist -czf release/frontend-0.1.0.tar.gz .
          git rev-parse HEAD > release/GIT_SHA
          payload=(CHANGELOG.md GIT_SHA backend-sbom.cdx.json frontend-0.1.0.tar.gz frontend-sbom.cdx.json openapi.yaml travel-assistant-api-0.1.0.jar)
          (cd release && sha256sum "${payload[@]}" > SHA256SUMS)
      - name: Verify release candidate before upload
        run: scripts/verify-release-candidate.sh release "$(git rev-parse HEAD)"
      - uses: actions/upload-artifact@v4
        with: { name: smart-travel-assistant-0.1.0-rc, path: release, retention-days: 14 }
