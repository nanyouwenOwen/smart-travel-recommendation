name: CI

on:
  push:
    branches: [main]
    tags: [v0.1.0]
  pull_request:

permissions:
  contents: read

jobs:
  openapi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: npx --yes @redocly/cli@2.12.3 lint docs/openapi.yaml --extends=minimal

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run format:check
      - run: npm run lint
      - run: npm run type-check
      - run: npm run test:coverage
      - run: npm run build

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
      - run: mvn --batch-mode verify

  e2e:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_DATABASE: travel_assistant
          MYSQL_USER: travel
          MYSQL_PASSWORD: travel
          MYSQL_ROOT_PASSWORD: local-root-password
        ports: ['3306:3306']
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -plocal-root-password"
          --health-interval=10s --health-timeout=5s --health-retries=10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          DB_URL: jdbc:mysql://127.0.0.1:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
          DB_USERNAME: travel
          DB_PASSWORD: travel
          TRIP_AI_PROVIDER: stub
          CONSULTATION_AI_PROVIDER: stub
      - uses: actions/upload-artifact@v4
        if: failure()
        with: { name: playwright-report, path: frontend/playwright-report, retention-days: 7 }

  container-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet
        env:
          MYSQL_DATABASE: travel_assistant
          MYSQL_USER: travel
          MYSQL_PASSWORD: ci-only-password
          MYSQL_ROOT_PASSWORD: ci-only-root-password
          JWT_SECRET: ci-only-secret-value-with-at-least-32-bytes
          TRIP_AI_PROVIDER: stub
          CONSULTATION_AI_PROVIDER: stub
          REALTIME_PROVIDER_MODE: stub
      - run: bash scripts/compose-smoke.sh
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-summary-${{ github.run_id }}
          path: perf-results/k6-summary.json
          if-no-files-found: warn
          retention-days: 7

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - name: Build the backend release JAR from this checkout
        run: |
          mvn --batch-mode -f backend/pom.xml -DskipTests package
          test -s backend/target/travel-assistant-api-0.1.0.jar
      - name: Record the fixed scanner version
        run: docker run --rm aquasec/trivy:0.58.2 --version
      - name: Scan the release JAR for every High or Critical vulnerability
        run: >-
          docker run --rm -v "$PWD:/workspace:ro" aquasec/trivy:0.58.2 fs
          --scanners vuln --severity HIGH,CRITICAL --exit-code 1
          /workspace/backend/target/travel-assistant-api-0.1.0.jar
      - name: Scan only tracked source files for secrets
        run: |
          tracked="$(mktemp -d)"
          trap 'rm -rf "$tracked"' EXIT
          git archive HEAD | tar -x -C "$tracked"
          docker run --rm -v "$tracked:/workspace:ro" aquasec/trivy:0.58.2 fs \
            --scanners secret --exit-code 1 /workspace

  release-candidate:
    runs-on: ubuntu-latest
    needs: [openapi, frontend, backend, e2e, container-smoke, security]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21, cache: maven }
      - uses: actions/setup-node@v4
        with: { node-version: 24, cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: mvn -q -f backend/pom.xml -DskipTests package
      - run: npm ci && npm run build && npm sbom --sbom-format cyclonedx > ../frontend-sbom.cdx.json
        working-directory: frontend
      - run: mvn -q -f backend/pom.xml org.cyclonedx:cyclonedx-maven-plugin:2.9.1:makeAggregateBom
      - run: |
          mkdir -p release
          cp backend/target/travel-assistant-api-0.1.0.jar release/
          cp backend/target/bom.json release/backend-sbom.cdx.json
          cp frontend-sbom.cdx.json docs/openapi.yaml CHANGELOG.md release/
          tar -C frontend/dist -czf release/frontend-0.1.0.tar.gz .
          git rev-parse HEAD > release/GIT_SHA
          payload=(CHANGELOG.md GIT_SHA backend-sbom.cdx.json frontend-0.1.0.tar.gz frontend-sbom.cdx.json openapi.yaml travel-assistant-api-0.1.0.jar)
          (cd release && sha256sum "${payload[@]}" > SHA256SUMS)
      - name: Verify release candidate before upload
        run: scripts/verify-release-candidate.sh release "$(git rev-parse HEAD)"
      - uses: actions/upload-artifact@v4
        with: { name: smart-travel-assistant-0.1.0-rc, path: release, retention-days: 14 }

  release:
    if: github.event_name == 'push' && github.ref == 'refs/tags/v0.1.0'
    runs-on: ubuntu-latest
    needs: [release-candidate]
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - uses: actions/download-artifact@v4
        with: { name: smart-travel-assistant-0.1.0-rc, path: release }
      - name: Verify annotated tag and downloaded candidate
        run: |
          test "$GITHUB_REF_NAME" = v0.1.0
          test "$(git cat-file -t "refs/tags/$GITHUB_REF_NAME")" = tag
          test "$(git rev-parse "refs/tags/$GITHUB_REF_NAME^{commit}")" = "$GITHUB_SHA"
          git fetch origin main
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main
          scripts/verify-release-candidate.sh release "$GITHUB_SHA"
      - name: Assemble, verify, and publish GitHub Release
        run: >-
          scripts/publish-github-release.sh "$GITHUB_REPOSITORY" "$GITHUB_REF_NAME"
          "$GITHUB_SHA" release docs/releases/v0.1.0.md

  release-recovery-v0-1-0:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [release-candidate]
    permissions:
      actions: read
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      RECOVERY_REPOSITORY: nanyouwenOwen/smart-travel-recommendation
      RECOVERY_TAG: v0.1.0
      RECOVERY_SHA: 52864b1aa72f56081abfc0bd146415d2a5f1ccb8
      RECOVERY_RUN_ID: '29175974787'
      RECOVERY_ARTIFACT: smart-travel-assistant-0.1.0-rc
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: 21 }
      - name: Verify immutable recovery identity and source run
        run: |
          set -euo pipefail
          test "$GITHUB_REPOSITORY" = "$RECOVERY_REPOSITORY"
          test "$GITHUB_EVENT_NAME" = push
          test "$GITHUB_REF" = refs/heads/main
          test "$(git rev-parse HEAD)" = "$GITHUB_SHA"
          git fetch origin main
          git fetch origin "refs/tags/$RECOVERY_TAG:refs/tags/$RECOVERY_TAG"
          test "$(git cat-file -t "refs/tags/$RECOVERY_TAG")" = tag
          test "$(git rev-parse "refs/tags/$RECOVERY_TAG^{commit}")" = "$RECOVERY_SHA"
          git merge-base --is-ancestor "$RECOVERY_SHA" "$GITHUB_SHA"

          run_json="$(mktemp)"; jobs_json="$(mktemp)"
          trap 'rm -f "$run_json" "$jobs_json"' EXIT
          gh api "repos/$RECOVERY_REPOSITORY/actions/runs/$RECOVERY_RUN_ID" >"$run_json"
          jq -e --arg repo "$RECOVERY_REPOSITORY" --arg sha "$RECOVERY_SHA" --arg tag "$RECOVERY_TAG" '
            .repository.full_name == $repo and .head_sha == $sha and .head_branch == $tag and .event == "push" and
            .status == "completed" and .conclusion == "failure"
          ' "$run_json" >/dev/null
          gh api --paginate "repos/$RECOVERY_REPOSITORY/actions/runs/$RECOVERY_RUN_ID/jobs?per_page=100" \
            | jq -s '[.[].jobs[]]' >"$jobs_json"
          for job in openapi frontend backend e2e container-smoke security release-candidate; do
            jq -e --arg job "$job" '[.[] | select(.name == $job and .conclusion == "success")] | length == 1' \
              "$jobs_json" >/dev/null
          done
          jq -e '[.[] | select(.name == "release" and .conclusion == "failure")] | length == 1' "$jobs_json" >/dev/null
      - uses: actions/download-artifact@v4
        with:
          name: ${{ env.RECOVERY_ARTIFACT }}
          path: release
          repository: ${{ env.RECOVERY_REPOSITORY }}
          run-id: ${{ env.RECOVERY_RUN_ID }}
          github-token: ${{ github.token }}
      - name: Verify fixed tag-run candidate
        run: scripts/verify-release-candidate.sh release "$RECOVERY_SHA"
      - name: Recover and verify v0.1.0 Release
        run: >-
          scripts/publish-github-release.sh "$RECOVERY_REPOSITORY" "$RECOVERY_TAG"
          "$RECOVERY_SHA" release docs/releases/v0.1.0.md
