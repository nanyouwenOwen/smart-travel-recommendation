spring:
  datasource:
    url: jdbc:h2:mem:travel_assistant;MODE=MySQL;DB_CLOSE_DELAY=-1
    username: sa
    password:
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop

app:
  auth:
    issuer: smart-travel-assistant-test
    access-token-ttl: PT5M
    refresh-token-ttl: PT1H
    jwt-secret: test-secret-key-that-is-longer-than-thirty-two-bytes
