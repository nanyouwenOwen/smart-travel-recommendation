spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  jpa:
    show-sql: false

server:
  forward-headers-strategy: framework
  shutdown: graceful

logging:
  level:
    root: INFO
    com.travelassistant: INFO

app:
  auth:
    jwt-secret: ${JWT_SECRET}
  trip-planning:
    provider: ${TRIP_AI_PROVIDER:openai-compatible}
  consultation:
    provider: ${CONSULTATION_AI_PROVIDER:openai-compatible}
