spring:
  application:
    name: travel-assistant-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:travel}
    password: ${DB_PASSWORD:travel}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ai:
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5-mini}
  auth:
    issuer: ${JWT_ISSUER:smart-travel-assistant}
    access-token-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:P30D}
    jwt-secret: ${JWT_SECRET:local-development-secret-must-be-at-least-32-bytes}
  trip-planning:
    provider: ${TRIP_AI_PROVIDER:stub}
    prompt-version: trip-planner/v1
    connect-timeout: ${TRIP_AI_CONNECT_TIMEOUT:PT5S}
    request-timeout: ${TRIP_AI_REQUEST_TIMEOUT:PT45S}
    total-timeout: ${TRIP_AI_TOTAL_TIMEOUT:PT2M}
    max-attempts: ${TRIP_AI_MAX_ATTEMPTS:3}
    global-concurrency: ${TRIP_AI_GLOBAL_CONCURRENCY:4}
    user-requests-per-minute: ${TRIP_AI_USER_RPM:5}
    job-stale-after: ${TRIP_JOB_STALE_AFTER:PT3M}
    recovery-interval: ${TRIP_RECOVERY_INTERVAL:PT30S}
    executor:
      core-size: ${TRIP_EXECUTOR_CORE_SIZE:2}
      max-size: ${TRIP_EXECUTOR_MAX_SIZE:4}
      queue-capacity: ${TRIP_EXECUTOR_QUEUE_CAPACITY:50}
  consultation:
    provider: ${CONSULTATION_AI_PROVIDER:stub}
    global-concurrency: ${CONSULTATION_GLOBAL_CONCURRENCY:4}
    user-rpm: ${CONSULTATION_USER_RPM:20}
    user-concurrency: ${CONSULTATION_USER_CONCURRENCY:1}
    request-timeout: ${CONSULTATION_REQUEST_TIMEOUT:PT45S}
    total-timeout: ${CONSULTATION_TOTAL_TIMEOUT:PT60S}
    first-byte-timeout: ${CONSULTATION_FIRST_BYTE_TIMEOUT:PT15S}
    idle-timeout: ${CONSULTATION_IDLE_TIMEOUT:PT20S}
    max-attempts: ${CONSULTATION_MAX_ATTEMPTS:2}
    event-retention: ${CONSULTATION_EVENT_RETENTION:PT10M}
    disconnect-grace: ${CONSULTATION_DISCONNECT_GRACE:PT30S}
    stub-chunk-delay: ${CONSULTATION_STUB_CHUNK_DELAY:PT0S}
