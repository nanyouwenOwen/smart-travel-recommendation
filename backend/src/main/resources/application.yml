spring:
  application:
    name: travel-assistant-api
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/travel_assistant?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC}
    username: ${DB_USERNAME:travel}
    password: ${DB_PASSWORD:travel}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true

server:
  port: ${SERVER_PORT:8080}

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  ai:
    base-url: ${AI_BASE_URL:https://api.openai.com/v1}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-5-mini}
  auth:
    issuer: ${JWT_ISSUER:smart-travel-assistant}
    access-token-ttl: ${ACCESS_TOKEN_TTL:PT15M}
    refresh-token-ttl: ${REFRESH_TOKEN_TTL:P30D}
    jwt-secret: ${JWT_SECRET:local-development-secret-must-be-at-least-32-bytes}
