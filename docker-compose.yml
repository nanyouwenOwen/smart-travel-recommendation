services:
  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-travel_assistant}
      MYSQL_USER: ${MYSQL_USER:-travel}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-travel}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-local-root-password}
    ports: ["${MYSQL_PORT:-3306}:3306"]
    volumes: ["mysql_data:/var/lib/mysql"]
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 5s
      timeout: 5s
      retries: 20
  backend:
    build: ./backend
    restart: unless-stopped
    environment:
      DB_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-travel_assistant}?useUnicode=true&characterEncoding=utf8&serverTimezone=UTC
      DB_USERNAME: ${MYSQL_USER:-travel}
      DB_PASSWORD: ${MYSQL_PASSWORD:-travel}
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-must-be-at-least-32-bytes}
      AI_BASE_URL: ${AI_BASE_URL:-https://api.openai.com/v1}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_MODEL: ${AI_MODEL:-gpt-5-mini}
      TRIP_AI_PROVIDER: ${TRIP_AI_PROVIDER:-stub}
      CONSULTATION_AI_PROVIDER: ${CONSULTATION_AI_PROVIDER:-stub}
      REALTIME_PROVIDER_MODE: ${REALTIME_PROVIDER_MODE:-stub}
    depends_on: { mysql: { condition: service_healthy } }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/api/v1/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
  frontend:
    build: ./frontend
    restart: unless-stopped
    ports: ["${FRONTEND_PORT:-5173}:8080"]
    depends_on: { backend: { condition: service_healthy } }
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/healthz >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
volumes: { mysql_data: {} }
