services:
  mysql:
    image: mysql:8.4
    container_name: travel-assistant-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: travel_assistant
      MYSQL_USER: travel
      MYSQL_PASSWORD: travel
      MYSQL_ROOT_PASSWORD: local-root-password
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-plocal-root-password"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mysql_data:

