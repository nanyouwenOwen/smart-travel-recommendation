openapi: 3.1.0
info:
  title: 智能旅游助手 API
  version: 0.1.0
  description: 前后端共同遵守的初始接口契约，业务接口将在实现时持续细化。
servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发
tags:
  - name: System
  - name: Auth
  - name: Trips
  - name: Conversations
paths:
  /health:
    get:
      tags: [System]
      operationId: getHealth
      security: []
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
  /auth/register:
    post:
      tags: [Auth]
      operationId: register
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '409': { $ref: '#/components/responses/Conflict' }
  /auth/login:
    post:
      tags: [Auth]
      operationId: login
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/refresh:
    post:
      tags: [Auth]
      operationId: refreshTokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '200':
          description: Token 轮换成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/AuthResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /auth/logout:
    post:
      tags: [Auth]
      operationId: logout
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RefreshTokenRequest' }
      responses:
        '204': { description: 已撤销或原本无效，幂等成功 }
        '400': { $ref: '#/components/responses/BadRequest' }
  /users/me:
    get:
      tags: [Auth]
      operationId: getCurrentUser
      responses:
        '200':
          description: 当前用户资料
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Auth]
      operationId: updateCurrentUser
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCurrentUserRequest' }
      responses:
        '200':
          description: 资料更新成功
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
  /trips:
    get:
      tags: [Trips]
      operationId: listTrips
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 行程列表
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripListResponse'
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Trips]
      operationId: createTrip
      parameters:
        - name: Idempotency-Key
          in: header
          required: true
          schema: { type: string, minLength: 8, maxLength: 128 }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTripRequest'
      responses:
        '202':
          description: 已接受生成任务
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /trips/{tripId}:
    parameters:
      - $ref: '#/components/parameters/TripId'
    get:
      tags: [Trips]
      operationId: getTrip
      responses:
        '200':
          description: 行程详情
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    patch:
      tags: [Trips]
      operationId: updateTrip
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateTripRequest' }
      responses:
        '202':
          description: 已接受重新规划任务
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
    delete:
      tags: [Trips]
      operationId: deleteTrip
      responses:
        '204': { description: 删除成功 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /trips/{tripId}/adjustments:
    post:
      tags: [Trips]
      operationId: adjustTrip
      parameters:
        - $ref: '#/components/parameters/TripId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [instruction]
              properties:
                instruction: { type: string, minLength: 2, maxLength: 2000 }
      responses:
        '202':
          description: 已接受调整任务，新版本生成中
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TripResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
  /trips/{tripId}/versions:
    get:
      tags: [Trips]
      operationId: listTripVersions
      parameters:
        - $ref: '#/components/parameters/TripId'
      responses:
        '200':
          description: 版本列表
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripVersionListResponse' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /trips/{tripId}/versions/{versionNumber}:
    get:
      tags: [Trips]
      operationId: getTripVersion
      parameters:
        - $ref: '#/components/parameters/TripId'
        - name: versionNumber
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: 历史版本详情
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripVersionResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /trips/{tripId}/versions/{versionNumber}:restore:
    post:
      tags: [Trips]
      operationId: restoreTripVersion
      parameters:
        - $ref: '#/components/parameters/TripId'
        - name: versionNumber
          in: path
          required: true
          schema: { type: integer, minimum: 1 }
      responses:
        '200':
          description: 当前版本已切换
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TripResponse' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /conversations:
    get:
      tags: [Conversations]
      operationId: listConversations
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 当前用户的会话列表
          content: { application/json: { schema: { $ref: '#/components/schemas/ConversationListResponse' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
    post:
      tags: [Conversations]
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateConversationRequest' }
      responses:
        '201':
          description: 会话创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConversationResponse'
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
  /conversations/{conversationId}:
    get:
      tags: [Conversations]
      operationId: getConversation
      parameters: [{ $ref: '#/components/parameters/ConversationId' }]
      responses:
        '200':
          description: 会话及消息详情
          content: { application/json: { schema: { $ref: '#/components/schemas/ConversationResponse' } } }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
  /conversations/{conversationId}/messages:
    get:
      tags: [Conversations]
      operationId: listConversationMessages
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: 消息正序分页
          content: { application/json: { schema: { $ref: '#/components/schemas/ConversationMessageListResponse' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
    post:
      tags: [Conversations]
      operationId: sendConversationMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: '#/components/schemas/SendMessageRequest' } } }
      responses:
        '200':
          description: 幂等重放已完成的同一问答
          content: { application/json: { schema: { $ref: '#/components/schemas/MessageTurnResponse' } } }
        '201':
          description: 问答完成
          content: { application/json: { schema: { $ref: '#/components/schemas/MessageTurnResponse' } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /conversations/{conversationId}/messages:stream:
    post:
      tags: [Conversations]
      operationId: streamMessage
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/SendMessageRequest' }
      responses:
        '200':
          description: SSE 事件流，事件类型为 ack、delta、done、error
          content:
            text/event-stream:
              schema: { type: string }
        '404': { $ref: '#/components/responses/NotFound' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '409': { $ref: '#/components/responses/Conflict' }
        '429': { $ref: '#/components/responses/TooManyRequests' }
        '503': { $ref: '#/components/responses/ServiceUnavailable' }
        '504': { $ref: '#/components/responses/GatewayTimeout' }
  /conversations/{conversationId}/streams/{streamId}:
    get:
      tags: [Conversations]
      operationId: replayConversationStream
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/StreamId'
        - name: Last-Event-ID
          in: header
          schema: { type: integer, minimum: 0, default: 0 }
      responses:
        '200':
          description: 从指定事件之后重放 SSE
          content: { text/event-stream: { schema: { type: string } } }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
        '409': { $ref: '#/components/responses/Conflict' }
    delete:
      tags: [Conversations]
      operationId: cancelConversationStream
      parameters:
        - $ref: '#/components/parameters/ConversationId'
        - $ref: '#/components/parameters/StreamId'
      responses:
        '204': { description: 流已取消或已处于终态 }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    Limit:
      name: limit
      in: query
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    TripId:
      name: tripId
      in: path
      required: true
      schema: { type: string, format: uuid }
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: { type: string, format: uuid }
    StreamId:
      name: streamId
      in: path
      required: true
      schema: { type: string, format: uuid }
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema: { type: string, minLength: 8, maxLength: 128 }
  responses:
    BadRequest:
      description: 请求参数不合法
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Unauthorized:
      description: 未认证或认证过期
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: 资源不存在
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Conflict:
      description: 资源或幂等键冲突
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    TooManyRequests:
      description: 请求频率或并发超过限制
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    ServiceUnavailable:
      description: 生成队列或外部服务暂时不可用
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    GatewayTimeout:
      description: AI 调用超过截止时间
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
  schemas:
    ResponseMeta:
      type: object
      required: [requestId]
      properties:
        requestId: { type: string }
    HealthResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [status]
          properties:
            status: { type: string, const: UP }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    RegisterRequest:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 8, maxLength: 72, format: password }
        displayName: { type: string, minLength: 1, maxLength: 50 }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email, maxLength: 254 }
        password: { type: string, minLength: 1, maxLength: 72, format: password }
    RefreshTokenRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken: { type: string, minLength: 1 }
    AuthResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [accessToken, refreshToken, expiresIn, tokenType]
          properties:
            accessToken: { type: string }
            refreshToken: { type: string }
            expiresIn: { type: integer, description: Access Token 剩余秒数 }
            tokenType: { type: string, const: Bearer }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    UpdateCurrentUserRequest:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 50 }
    UserProfile:
      type: object
      required: [id, email, displayName, createdAt]
      properties:
        id: { type: string, format: uuid }
        email: { type: string, format: email }
        displayName: { type: string }
        createdAt: { type: string, format: date-time }
    UserResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/UserProfile' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    Money:
      type: object
      required: [amount, currency]
      properties:
        amount:
          type: string
          pattern: '^\d+(\.\d{1,2})?$'
          examples: ['5000.00']
        currency:
          type: string
          pattern: '^[A-Z]{3}$'
          examples: [CNY]
    CreateTripRequest:
      type: object
      required: [destination, startDate, days, budget, travelers, preferences, timezone]
      properties:
        destination: { type: string, minLength: 1, maxLength: 200 }
        startDate: { type: string, format: date }
        days: { type: integer, minimum: 1, maximum: 30 }
        budget: { $ref: '#/components/schemas/Money' }
        travelers: { type: integer, minimum: 1, maximum: 50 }
        preferences:
          type: array
          maxItems: 20
          items: { type: string, minLength: 1, maxLength: 50 }
        timezone: { type: string, examples: [Asia/Shanghai] }
        additionalRequirements: { type: string, maxLength: 2000 }
    UpdateTripRequest:
      $ref: '#/components/schemas/CreateTripRequest'
    TripSummary:
      type: object
      required: [id, destination, startDate, days, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        destination: { type: string }
        startDate: { type: string, format: date }
        days: { type: integer }
        status: { type: string, enum: [DRAFT, GENERATING, READY, FAILED] }
        currentVersion: { type: integer, minimum: 1 }
        failureCode: { type: string }
        createdAt: { type: string, format: date-time }
    Activity:
      type: object
      required: [sequenceNumber, startTime, endTime, title, location, estimatedCost, category]
      properties:
        sequenceNumber: { type: integer, minimum: 1 }
        startTime: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        endTime: { type: string, pattern: '^([01]\d|2[0-3]):[0-5]\d$' }
        title: { type: string }
        location: { type: string }
        description: { type: string }
        estimatedCost: { $ref: '#/components/schemas/Money' }
        transportAdvice: { type: string }
        category:
          type: string
          enum: [TRANSPORTATION, ACCOMMODATION, FOOD, ATTRACTION, SHOPPING, OTHER]
    ItineraryDay:
      type: object
      required: [dayNumber, date, activities]
      properties:
        dayNumber: { type: integer, minimum: 1 }
        date: { type: string, format: date }
        summary: { type: string }
        activities:
          type: array
          items: { $ref: '#/components/schemas/Activity' }
    Trip:
      allOf:
        - $ref: '#/components/schemas/TripSummary'
        - type: object
          required: [budget, travelers, preferences, timezone, itinerary]
          properties:
            budget: { $ref: '#/components/schemas/Money' }
            estimatedTotal: { $ref: '#/components/schemas/Money' }
            currency: { type: string, pattern: '^[A-Z]{3}$' }
            travelers: { type: integer }
            preferences: { type: array, items: { type: string } }
            timezone: { type: string }
            additionalRequirements: { type: string, maxLength: 2000 }
            warnings: { type: array, items: { type: string } }
            itinerary: { type: array, items: { $ref: '#/components/schemas/ItineraryDay' } }
            budgetBreakdown: { $ref: '#/components/schemas/BudgetBreakdown' }
    BudgetCategoryAmount:
      type: object
      required: [category, amount]
      properties:
        category: { type: string, enum: [TRANSPORTATION, ACCOMMODATION, FOOD, ATTRACTION, SHOPPING, OTHER] }
        amount: { $ref: '#/components/schemas/Money' }
    BudgetBreakdown:
      type: object
      required: [categories, total, exceedsBudget]
      properties:
        categories: { type: array, items: { $ref: '#/components/schemas/BudgetCategoryAmount' } }
        total: { $ref: '#/components/schemas/Money' }
        exceedsBudget: { type: boolean }
        exceededBy: { $ref: '#/components/schemas/Money' }
    TripResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/Trip' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    TripListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/TripSummary' } }
        meta:
          allOf:
            - $ref: '#/components/schemas/ResponseMeta'
            - type: object
              required: [hasMore]
              properties:
                nextCursor: { type: string }
                hasMore: { type: boolean }
    TripVersionSummary:
      type: object
      required: [versionNumber, estimatedTotal, createdAt]
      properties:
        versionNumber: { type: integer, minimum: 1 }
        estimatedTotal: { $ref: '#/components/schemas/Money' }
        createdAt: { type: string, format: date-time }
    TripVersionListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/TripVersionSummary' } }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    TripVersionResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          allOf:
            - $ref: '#/components/schemas/TripVersionSummary'
            - type: object
              required: [itinerary, budgetBreakdown]
              properties:
                warnings: { type: array, items: { type: string } }
                itinerary: { type: array, items: { $ref: '#/components/schemas/ItineraryDay' } }
                budgetBreakdown: { $ref: '#/components/schemas/BudgetBreakdown' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    CreateConversationRequest:
      type: object
      properties:
        title: { type: string, maxLength: 100 }
        tripId: { type: string, format: uuid }
    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content: { type: string, minLength: 1, maxLength: 5000 }
    ConversationMessage:
      type: object
      required: [id, role, content, status, createdAt]
      properties:
        id: { type: string, format: uuid }
        role: { type: string, enum: [USER, ASSISTANT] }
        content: { type: string }
        status: { type: string, enum: [PENDING, STREAMING, COMPLETED, FAILED] }
        tripVersionNumber: { type: integer, minimum: 1 }
        model: { type: string }
        usage:
          type: object
          properties:
            inputTokens: { type: integer, minimum: 0 }
            outputTokens: { type: integer, minimum: 0 }
        errorCode: { type: string }
        createdAt: { type: string, format: date-time }
        completedAt: { type: string, format: date-time }
    Conversation:
      type: object
      required: [id, createdAt, updatedAt, messages]
      properties:
        id: { type: string, format: uuid }
        title: { type: string }
        tripId: { type: string, format: uuid }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
        messages: { type: array, items: { $ref: '#/components/schemas/ConversationMessage' } }
    ConversationResponse:
      type: object
      required: [data, meta]
      properties:
        data: { $ref: '#/components/schemas/Conversation' }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    ConversationListResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: array
          items:
            type: object
            required: [id, updatedAt]
            properties:
              id: { type: string, format: uuid }
              title: { type: string }
              tripId: { type: string, format: uuid }
              updatedAt: { type: string, format: date-time }
        meta:
          allOf:
            - $ref: '#/components/schemas/ResponseMeta'
            - type: object
              required: [hasMore]
              properties:
                nextCursor: { type: string }
                hasMore: { type: boolean }
    ConversationMessageListResponse:
      type: object
      required: [data, meta]
      properties:
        data: { type: array, items: { $ref: '#/components/schemas/ConversationMessage' } }
        meta:
          allOf:
            - $ref: '#/components/schemas/ResponseMeta'
            - type: object
              required: [hasMore]
              properties:
                nextCursor: { type: string }
                hasMore: { type: boolean }
    MessageTurnResponse:
      type: object
      required: [data, meta]
      properties:
        data:
          type: object
          required: [userMessage, assistantMessage, replayed]
          properties:
            userMessage: { $ref: '#/components/schemas/ConversationMessage' }
            assistantMessage: { $ref: '#/components/schemas/ConversationMessage' }
            replayed: { type: boolean }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
    StreamAckEvent:
      type: object
      required: [streamId, userMessageId, assistantMessageId, eventId]
      properties:
        streamId: { type: string, format: uuid }
        userMessageId: { type: string, format: uuid }
        assistantMessageId: { type: string, format: uuid }
        eventId: { type: integer, minimum: 1 }
    StreamDeltaEvent:
      type: object
      required: [streamId, messageId, sequence, content]
      properties:
        streamId: { type: string, format: uuid }
        messageId: { type: string, format: uuid }
        sequence: { type: integer, minimum: 1 }
        content: { type: string }
    StreamDoneEvent:
      type: object
      required: [streamId, messageId, status, usage, replayed]
      properties:
        streamId: { type: string, format: uuid }
        messageId: { type: string, format: uuid }
        status: { type: string, const: COMPLETED }
        usage: { type: object }
        replayed: { type: boolean }
    StreamErrorEvent:
      type: object
      required: [streamId, code, message, retryable, final]
      properties:
        streamId: { type: string, format: uuid }
        code: { type: string }
        message: { type: string }
        retryable: { type: boolean }
        final: { type: boolean }
    ErrorResponse:
      type: object
      required: [error, meta]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, examples: [VALIDATION_ERROR] }
            message: { type: string }
            details:
              type: array
              items:
                type: object
                properties:
                  field: { type: string }
                  reason: { type: string }
        meta: { $ref: '#/components/schemas/ResponseMeta' }
security:
  - bearerAuth: []
